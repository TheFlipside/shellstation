name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: linux
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Verify toolchain
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version

      - name: Cache cargo registry
        uses: https://github.com/actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            linux-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --bundles deb,appimage

      - name: Collect artifacts
        run: |
          mkdir -p dist-release
          cp src-tauri/target/release/bundle/deb/*.deb dist-release/ || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage dist-release/ || true
          ls -la dist-release/

      - name: Upload artifacts
        uses: https://github.com/actions/upload-artifact@v3
        with:
          name: linux-bundles
          path: dist-release/*

  build-windows:
    runs-on: windows
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Verify toolchain
        shell: powershell
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version
          rustup target add x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: https://github.com/actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --bundles msi,nsis

      - name: Collect artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null
          Copy-Item src-tauri/target/release/bundle/msi/*.msi dist-release/ -ErrorAction SilentlyContinue
          Copy-Item src-tauri/target/release/bundle/nsis/*.exe dist-release/ -ErrorAction SilentlyContinue
          Get-ChildItem dist-release

      - name: Upload artifacts
        uses: https://github.com/actions/upload-artifact@v3
        with:
          name: windows-bundles
          path: dist-release/*

  publish-release:
    needs: [build-linux, build-windows]
    runs-on: linux
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Download Linux artifacts
        uses: https://github.com/actions/download-artifact@v3
        with:
          name: linux-bundles
          path: release-files

      - name: Download Windows artifacts
        uses: https://github.com/actions/download-artifact@v3
        with:
          name: windows-bundles
          path: release-files

      - name: List release files
        run: ls -la release-files/

      - name: Publish Forgejo release
        env:
          FORGEJO_URL: https://git.fiedler.live
          REPO: tux/shellstation
          TAG: ${{ github.ref_name }}
          TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          api="$FORGEJO_URL/api/v1/repos/$REPO"
          auth="Authorization: token $TOKEN"

          # Find existing release by tag, or create one.
          release_id=$(curl -fsSL -H "$auth" "$api/releases/tags/$TAG" | \
            sed -n 's/.*"id":\s*\([0-9]*\).*/\1/p' | head -n1 || true)

          if [ -z "${release_id:-}" ]; then
            echo "Creating release $TAG"
            release_id=$(curl -fsSL -X POST -H "$auth" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\"}" \
              "$api/releases" | \
              sed -n 's/.*"id":\s*\([0-9]*\).*/\1/p' | head -n1)
          else
            echo "Reusing existing release $TAG (id=$release_id)"
          fi

          if [ -z "${release_id:-}" ]; then
            echo "Failed to obtain release id" >&2
            exit 1
          fi

          # Fetch existing assets so we can overwrite.
          assets_json=$(curl -fsSL -H "$auth" "$api/releases/$release_id/assets")

          for f in release-files/*; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            existing_id=$(printf '%s' "$assets_json" | \
              awk -v n="\"name\":\"$name\"" '
                /"id":/ { id=$0 }
                $0 ~ n { print id; exit }
              ' | sed -n 's/.*"id":\s*\([0-9]*\).*/\1/p')
            if [ -n "${existing_id:-}" ]; then
              echo "Deleting existing asset $name (id=$existing_id)"
              curl -fsSL -X DELETE -H "$auth" \
                "$api/releases/$release_id/assets/$existing_id"
            fi
            echo "Uploading $name"
            curl -fsSL -X POST -H "$auth" \
              -F "attachment=@$f" \
              "$api/releases/$release_id/assets?name=$name"
          done
