name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: linux
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Verify toolchain
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version

      - name: Cache cargo registry
        uses: https://github.com/actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            linux-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --bundles deb,appimage

      - name: Collect artifacts
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist-release
          for f in src-tauri/target/release/bundle/deb/*.deb; do
            [ -f "$f" ] || continue
            cp "$f" "dist-release/ShellStation-linux-amd64-${version}.deb"
          done
          for f in src-tauri/target/release/bundle/appimage/*.AppImage; do
            [ -f "$f" ] || continue
            cp "$f" "dist-release/ShellStation-linux-amd64-${version}.AppImage"
          done
          ls -la dist-release/

      - name: Upload artifacts
        uses: https://github.com/actions/upload-artifact@v3
        with:
          name: linux-bundles
          path: dist-release/*

  build-windows:
    runs-on: windows
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Verify toolchain
        shell: powershell
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version
          rustup target add x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: https://github.com/actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --bundles msi,nsis

      - name: Collect artifacts
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null

          $msi = Get-ChildItem src-tauri/target/release/bundle/msi/*.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName "dist-release/ShellStation-windows-x64-$version.msi"
          }

          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName "dist-release/ShellStation-windows-x64-$version-setup.exe"
          }

          $raw = "src-tauri/target/release/shellstation.exe"
          if (Test-Path $raw) {
            $stage = New-Item -ItemType Directory -Force -Path "dist-release/zip-stage"
            Copy-Item $raw (Join-Path $stage.FullName "ShellStation.exe")
            Compress-Archive -Path (Join-Path $stage.FullName "ShellStation.exe") `
              -DestinationPath "dist-release/ShellStation-windows-x64-$version.zip" -Force
            Remove-Item -Recurse -Force $stage.FullName
          }

          Get-ChildItem dist-release

      - name: Upload artifacts
        uses: https://github.com/actions/upload-artifact@v3
        with:
          name: windows-bundles
          path: dist-release/*

  publish-release:
    needs: [build-linux, build-windows]
    runs-on: linux
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Download Linux artifacts
        uses: https://github.com/actions/download-artifact@v3
        with:
          name: linux-bundles
          path: release-files

      - name: Download Windows artifacts
        uses: https://github.com/actions/download-artifact@v3
        with:
          name: windows-bundles
          path: release-files

      - name: List release files
        run: ls -la release-files/

      - name: Publish Forgejo release
        env:
          FORGEJO_URL: https://git.fiedler.live
          REPO: tux/shellstation
          TAG: ${{ github.ref_name }}
          TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          api="$FORGEJO_URL/api/v1/repos/$REPO"
          auth="Authorization: token $TOKEN"

          # Helper: perform an API call and capture status + body separately
          # so failures can be diagnosed instead of silently swallowed.
          api_call() {
            local method="$1"
            local url="$2"
            shift 2
            local body_file status
            body_file=$(mktemp)
            status=$(curl -sS -o "$body_file" -w '%{http_code}' \
              -X "$method" -H "$auth" "$@" "$url")
            printf '%s\n' "$status"
            cat "$body_file"
            rm -f "$body_file"
          }

          # Look up existing release by tag. 404 is expected on first run.
          lookup=$(api_call GET "$api/releases/tags/$TAG")
          lookup_status=$(printf '%s' "$lookup" | head -n1)
          lookup_body=$(printf '%s' "$lookup" | tail -n +2)

          # Extract the FIRST "id":N from a JSON body. The release's own id
          # is always the first id field; nested objects (author, etc.) come
          # later, so a greedy match would return the wrong one.
          first_id() {
            grep -o '"id"[[:space:]]*:[[:space:]]*[0-9]*' | \
              head -n1 | grep -o '[0-9]*$'
          }

          if [ "$lookup_status" = "200" ]; then
            release_id=$(printf '%s' "$lookup_body" | first_id)
            echo "Reusing existing release $TAG (id=$release_id)"
          elif [ "$lookup_status" = "404" ]; then
            echo "Creating release $TAG"
            create=$(api_call POST "$api/releases" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\"}")
            create_status=$(printf '%s' "$create" | head -n1)
            create_body=$(printf '%s' "$create" | tail -n +2)
            if [ "$create_status" != "201" ]; then
              echo "Release creation failed: HTTP $create_status" >&2
              echo "$create_body" >&2
              exit 1
            fi
            release_id=$(printf '%s' "$create_body" | first_id)
          else
            echo "Release lookup failed: HTTP $lookup_status" >&2
            echo "$lookup_body" >&2
            exit 1
          fi

          if [ -z "${release_id:-}" ]; then
            echo "Failed to obtain release id" >&2
            exit 1
          fi

          # Fetch existing assets so we can overwrite.
          assets=$(api_call GET "$api/releases/$release_id/assets")
          assets_status=$(printf '%s' "$assets" | head -n1)
          assets_json=$(printf '%s' "$assets" | tail -n +2)
          if [ "$assets_status" != "200" ]; then
            echo "Asset listing failed: HTTP $assets_status" >&2
            echo "$assets_json" >&2
            exit 1
          fi

          for f in release-files/*; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            # Split assets_json into one object per line, then find the line
            # with matching name and extract its id. Works on compact JSON.
            existing_id=$(printf '%s' "$assets_json" | \
              tr '}' '\n' | \
              grep -F "\"name\":\"$name\"" | \
              grep -o '"id"[[:space:]]*:[[:space:]]*[0-9]*' | \
              head -n1 | grep -o '[0-9]*$' || true)
            if [ -n "${existing_id:-}" ]; then
              echo "Deleting existing asset $name (id=$existing_id)"
              curl -fsSL -X DELETE -H "$auth" \
                "$api/releases/$release_id/assets/$existing_id"
            fi
            echo "Uploading $name"
            upload=$(curl -sS -o /tmp/upload-body -w '%{http_code}' \
              -X POST -H "$auth" \
              -F "attachment=@$f" \
              "$api/releases/$release_id/assets?name=$name")
            if [ "$upload" != "201" ]; then
              echo "Upload of $name failed: HTTP $upload" >&2
              cat /tmp/upload-body >&2
              exit 1
            fi
          done
