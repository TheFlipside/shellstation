name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: linux
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Verify toolchain
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version

      - name: Cache cargo registry & target
        uses: https://github.com/actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            linux-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --bundles deb,appimage

      - name: Collect artifacts
        run: |
          mkdir -p dist-release
          cp src-tauri/target/release/bundle/deb/*.deb dist-release/ || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage dist-release/ || true
          ls -la dist-release/

      - name: Upload artifacts
        uses: https://github.com/actions/upload-artifact@v3
        with:
          name: linux-bundles
          path: dist-release/*

  build-windows:
    runs-on: windows
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Verify toolchain
        shell: pwsh
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version
          rustup target add x86_64-pc-windows-msvc

      - name: Cache cargo registry & target
        uses: https://github.com/actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --bundles msi,nsis

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null
          Copy-Item src-tauri/target/release/bundle/msi/*.msi dist-release/ -ErrorAction SilentlyContinue
          Copy-Item src-tauri/target/release/bundle/nsis/*.exe dist-release/ -ErrorAction SilentlyContinue
          Get-ChildItem dist-release

      - name: Upload artifacts
        uses: https://github.com/actions/upload-artifact@v3
        with:
          name: windows-bundles
          path: dist-release/*

  publish-release:
    needs: [build-linux, build-windows]
    runs-on: linux
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Download Linux artifacts
        uses: https://github.com/actions/download-artifact@v3
        with:
          name: linux-bundles
          path: release-files

      - name: Download Windows artifacts
        uses: https://github.com/actions/download-artifact@v3
        with:
          name: windows-bundles
          path: release-files

      - name: List release files
        run: ls -la release-files/

      - name: Publish Forgejo release
        uses: actions/forgejo-release@v2
        with:
          direction: upload
          url: https://git.fiedler.live
          repo: tux/shellstation
          tag: ${{ github.ref_name }}
          release-dir: release-files
          token: ${{ secrets.RELEASE_TOKEN }}
          override: true
